services:
  - type: web
    name: helden-backend
    env: python
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_PATH
        value: /app/data/helden.db
    disk:
      mountPath: /app/data
      size: 1GB
